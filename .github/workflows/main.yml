name: Build Cham-Tube APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Unzip Project Files
      run: |
        if [ -f "app.zip" ]; then
          echo "Unzipping app.zip..."
          unzip -o app.zip
        else
          echo "Error: app.zip not found!"
          exit 1
        fi

    - name: Enable AndroidX Support
      run: |
        echo "android.useAndroidX=true" > gradle.properties
        echo "android.enableJetifier=true" >> gradle.properties

    - name: Grant Execute Permission for Gradle
      run: |
        cd app && chmod +x gradlew

    - name: Build with Gradle 8.7
      run: |
        cd app && ./gradlew clean assembleRelease --no-daemon

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ChamTube-Release-APK
        path: |
          app/build/outputs/apk/release/*.apk
          app/build/outputs/apk/debug/*.apk
