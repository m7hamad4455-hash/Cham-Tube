name: Build Cham-Tube APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Unzip Project Files
      run: |
        if [ -f "app.zip" ]; then
          echo "Unzipping app.zip..."
          unzip -o app.zip
        else
          echo "Error: app.zip not found!"
          exit 1
        fi

    - name: Enable AndroidX Support
      run: |
        echo "android.useAndroidX=true" > gradle.properties
        echo "android.enableJetifier=true" >> gradle.properties
        if [ -d "app" ]; then
          echo "android.useAndroidX=true" > app/gradle.properties
          echo "android.enableJetifier=true" >> app/gradle.properties
        fi

    - name: Grant Execute Permission for Gradle
      run: |
        find . -name "gradlew" -exec chmod +x {} +
        echo "تم إعطاء صلاحيات التشغيل لملفات التجميع بنجاح. ✅"

    - name: Build with Gradle 8.7
      run: |
        if [ -f "gradlew" ]; then
          ./gradlew clean assembleRelease --no-daemon
        else
          cd app && ./gradlew clean assembleRelease --no-daemon
        fi

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ChamTube-Release-APK
        path: |
          **/build/outputs/apk/release/*.apk
          **/build/outputs/apk/debug/*.apk
