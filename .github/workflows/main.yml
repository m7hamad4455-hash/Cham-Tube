  - name: Set up JDK 17
    uses: actions/setup-java@v4
    with:
      distribution: 'temurin'
      java-version: '17'

  - name: Install Android commandline tools and SDK platforms
    run: |
      export ANDROID_SDK_ROOT=${{ env.ANDROID_SDK_ROOT }}
      mkdir -p "$ANDROID_SDK_ROOT/cmdline-tools"
      wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O /tmp/cmdline.zip
      unzip -q /tmp/cmdline.zip -d /tmp/cmdline
      mkdir -p $ANDROID_SDK_ROOT/cmdline-tools/latest
      mv /tmp/cmdline/cmdline-tools/* $ANDROID_SDK_ROOT/cmdline-tools/latest/
      yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_SDK_ROOT --licenses || true
      yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_SDK_ROOT "platform-tools" "platforms;android-33" "build-tools;33.0.0"

  - name: Unzip app.zip if present
    run: |
      if [ -f app.zip ]; then
        unzip -o app.zip -d .
      fi

  - name: Ensure gradlew is executable
    run: |
      if [ -f gradlew ]; then chmod +x gradlew; fi

  - name: Build Debug APK
    run: |
      if [ -f gradlew ]; then ./gradlew clean assembleDebug --no-daemon; else echo "gradlew not found"; exit 1; fi

  - name: Upload APK artifact
    uses: actions/upload-artifact@v4
    with:
      name: app-debug-apk
      path: app/build/outputs/apk/debug/*.apk
