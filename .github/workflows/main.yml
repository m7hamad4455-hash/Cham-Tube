name: Build Cham-Tube APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. جلب ملفات المشروع من المستودع
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. إعداد بيئة جافا (Java 17)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      # 3. تثبيت أداة Gradle وإعداد بيئة العمل تلقائياً لتخطي الملف المفقود
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.7

      # 4. تنظيف وبناء الـ APK باستخدام أمر gradle المدمج في النظام مباشرة
      - name: Build Release APK
        run: gradle clean assembleRelease --no-daemon

      # 5. حفظ وحقن ملف الـ APK الناتج لتحميله
      - name: Upload Build Artifact (APK)
        uses: actions/upload-artifact@v4
        with:
          name: ChamTube-Release-APK
          path: app/build/outputs/apk/release/app-release-unsigned.apk
