name: Build Cham-Tube APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Unzip Project Files
      run: |
        if [ -f "app.zip" ]; then
          echo "Unzipping app.zip..."
          unzip -o app.zip
        else
          echo "Error: app.zip not found!"
          exit 1
        fi

    - name: Enable AndroidX Support
      run: |
        # إنشاء ملف gradle.properties وضبط الإعدادات المطلوبة لياندكس تلقائياً بالسيرفر
        echo "android.useAndroidX=true" > gradle.properties
        echo "android.enableJetifier=true" >> gradle.properties
        echo "تفعيل خيارات AndroidX لشبكة ياندكس بنجاح. ✅"

    - name: Grant Execute Permission for Gradle
      run: |
        if [ -f "gradlew" ]; then
          chmod +x gradlew
        elif [ -f "app/gradlew" ]; then
          cd app && chmod +x gradlew && cd ..
        else
          echo "Warning: gradlew wrapper not found, checking local setup."
        fi

    - name: Build with Gradle 8.7
      run: |
        if [ -f "gradlew" ]; then
          ./gradlew assembleRelease --no-daemon
        elif [ -f "app/gradlew" ]; then
          cd app && ./gradlew assembleRelease --no-daemon && cd ..
        else
          gradle assembleRelease --no-daemon
        fi

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ChamTube-Release-APK
        path: |
          **/build/outputs/apk/release/*.apk
          **/build/outputs/apk/debug/*.apk
