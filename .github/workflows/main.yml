name: Build Cham-Tube APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. جلب ملفات المشروع من المستودع
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. إعداد بيئة جافا (Java 17)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      # 3. تثبيت أداة Gradle وإعداد بيئة العمل تلقائياً
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.7

      # 4. خطوة سحرية لإنشاء ملف settings.gradle في المجلد الرئيسي إذا كان مفقوداً
      - name: Ensure Root Project Settings
        run: |
          if [ ! -f settings.gradle ] && [ ! -f settings.gradle.kts ]; then
            echo "include ':app'" > settings.gradle
          fi

      # 5. إصلاح خطأ استبدال الملفات (تأكيد الاستبدال التلقائي الصامت لأي ملفات مضغوطة إن وُجدت)
      - name: Auto-Confirm File Extraction
        run: |
          if [ -f app.zip ]; then
            unzip -o app.zip || true
          fi

      # 6. تنظيف وبناء الـ APK مع تطبيق حلول الاستقرار لمنع طلب أي مدخلات يدوية (حل Copilot المطور)
      - name: Build Release APK
        run: |
          echo "org.gradle.jvmargs=-Xmx2048m" >> gradle.properties
          gradle :app:clean :app:assembleRelease --no-daemon --stacktrace --console=plain < /dev/null
        env:
          CI: true

      # 7. حفظ وحقن ملف الـ APK الناتج لتحميله من الموقع مباشرة
      - name: Upload Build Artifact (APK)
        uses: actions/upload-artifact@v4
        with:
          name: ChamTube-Release-APK
          path: |
            app/build/outputs/apk/release/app-release-unsigned.apk
            **/build/outputs/apk/release/*.apk
