name: Build Cham-Tube APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch: # يتيح لك تشغيل البناء يدوياً من موقع غيت هاب

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. جلب ملفات المشروع من المستودع
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. إعداد بيئة جافا (Java 17 متوافقة تماماً مع Gradle 8.7 و Target SDK 34)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: gradle

      # 3. إعطاء صلاحيات التنفيذ لملف Gradle Wrapper
      - name: Grant Execute Permission for Gradlew
        run: chmod +x gradlew

      # 4. تنظيف الكاش القديم وبناء نسخة الـ APK النهائية باستخدام الأمر الكامل
      - name: Build Release APK with Gradle
        run: ./gradlew clean assembleRelease --no-daemon

      # 5. حفظ وحقن ملف الـ APK الناتج لكي تتمكن من تحميله مباشرة بعد انتهاء البناء
      - name: Upload Build Artifact (APK)
        uses: actions/upload-artifact@v4
        with:
          name: ChamTube-Release-APK
          path: app/build/outputs/apk/release/app-release-unsigned.apk
