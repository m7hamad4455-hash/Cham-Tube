name: Build and Sign Cham-Tube APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'zulu'

    # تثبيت إصدار Gradle 8.7 لتوافق كامل مع مشروعك
    - name: Setup Gradle 8.7
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '8.7'

    - name: Unzip and Generate Central Repositories
      run: |
        # 1. تنظيف وتدمير أي ملفات قديمة مسببة للتضارب في الجذر
        rm -f settings.gradle build.gradle || true
        
        # 2. فك الضغط في الجذر الحالي
        unzip -o app.zip -d .
        echo "Project unzipped successfully."
        
        # 3. توليد ملف settings.gradle المفقود برمجياً لربط مجلد app الإجبارى
        echo "include ':app'" > settings.gradle
        
        # 4. بناء ملف build.gradle الرئيسي في الجذر وحقن مستودعات جوجل وياندكس لحل مشكلة الـ Plugin
        cat << 'EOF' > build.gradle
        buildscript {
            repositories {
                google()
                mavenCentral()
            }
            dependencies {
                // استدعاء أدوات بناء أندرويد الرسمية المتوافقة مع إصدار Gradle 8.7
                classpath 'com.android.tools.build:gradle:8.3.2'
            }
        }
        allprojects {
            repositories {
                google()
                mavenCentral()
                // مستودع مكتبة إعلانات ياندكس الرسمي
                maven { url "https://repo.yandex.ru/repository/maven3/" }
            }
        }
        EOF
        echo "Root build.gradle and settings.gradle successfully created with official repositories."

    - name: Patch ADRTLogCatReader and Banner Size
      run: |
        # إزالة سطر ADRT المسبب للمشاكل في بيئة AIDE وتعديل حجم البانر
        find . -name "ADRTLogCatReader.java" -exec sed -i '/ADRTLogCatReader/d' {} +
        find . -name "*activity_main.xml" -o -name "*fragment_ad.xml" | xargs sed -i 's/wrap_content/match_parent/g' || true

    - name: Inject Banner ID and 30s Auto-Refresh Timer
      run: |
        FILE_PATH=$(find . -name "BannerAdManager.java" | head -n 1)
        
        if [ -n "$FILE_PATH" ]; then
          echo "Found BannerAdManager at: $FILE_PATH"
          
          # 1. إصلاح معرف البانر (حذف الشرطة الزائدة) ليتطابق مع اللوحة الرسمية
          sed -i 's/"R-M-19531989-1"/"RM-19531989-1"/g' "$FILE_PATH"
          
          # 2. حقن مكتبات أندرويد الرسمية للـ Handler
          sed -i '/package com.chamapps.chamtube;/a import android.os.Handler;\nimport android.os.Looper;' "$FILE_PATH"
          
          # 3. حقن متغيرات المؤقت التكراري داخل كلاس BannerAdManager
          sed -i '/public class BannerAdManager/a \    private final Handler refreshHandler = new Handler(Looper.getMainLooper());\n    private Runnable refreshRunnable;' "$FILE_PATH"
          
          # 4. حقن منطق إعادة التحميل التلقائي كل 30 ثانية (30000ms)
          sed -i '/AdRequest adRequest = new AdRequest.Builder().build();/i \                if (refreshRunnable == null) {\n                    refreshRunnable = new Runnable() {\n                        @Override\n                        public void run() {\n                            if (currentBanner != null) {\n                                AdRequest refreshRequest = new AdRequest.Builder().build();\n                                currentBanner.loadAd(refreshRequest);\n                                refreshHandler.postDelayed(this, 30000);\n                            }\n                        }\n                    };\n                }\n                refreshHandler.removeCallbacks(refreshRunnable);\n                refreshHandler.postDelayed(refreshRunnable, 30000);' "$FILE_PATH"
          
          # 5. إلغاء جدولة المؤقت التكراري بأمان عند إيقاف الإعلانات
          sed -i '/public void stopBannerAds()/a \        refreshHandler.removeCallbacks(refreshRunnable);' "$FILE_PATH"
          
          echo "Auto-refresh and Banner Ad ID patched successfully."
        else
          echo "Error: BannerAdManager.java not found!"
          exit 1
        fi

    - name: Patch Rewarded Ad ID Format
      run: |
        REWARDED_FILE=$(find . -name "RewardedAdManager.java" | head -n 1)
        
        if [ -n "$REWARDED_FILE" ]; then
          echo "Found RewardedAdManager at: $REWARDED_FILE"
          sed -i 's/"R-M-19537340-1"/"RM-19537340-1"/g' "$REWARDED_FILE"
          echo "Rewarded Ad ID patched successfully."
        else
          echo "Error: RewardedAdManager.java not found!"
          exit 1
        fi

    - name: Build Release APK
      run: |
        # تشغيل البناء بعد تأمين المستودعات والـ Plugins كاملة
        gradle assembleRelease --no-daemon

    - name: Sign Release APK
      uses: r0adkll/sign-android-release@v1
      id: sign_app
      with:
        releaseDirectory: app/build/outputs/apk/release
        signingKeyBase64: ${{ secrets.SIGNING_KEY }}
        alias: ${{ secrets.ALIAS }}
        keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
        keyPassword: ${{ secrets.KEY_PASSWORD }}
      env:
        BUILD_TOOLS_VERSION: "34.0.0"

    - name: Upload Signed APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Cham-Tube-Signed-Release
        path: ${{ steps.sign_app.outputs.signedReleaseFile }}
