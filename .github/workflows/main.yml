name: Build Cham-Tube APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. جلب ملفات المشروع من المستودع
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. إعداد جافا 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      # 3. تثبيت Gradle 8.7 مع إيقاف الكاش
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.7
          cache-disabled: true

      # 4. فك ملفات الـ Zip لتجهيز مجلد التطبيق الأصلي
      - name: Auto-Confirm File Extraction
        run: |
          if [ -f app.zip ]; then
            unzip -o app.zip || true
          fi

      # 5. خطوة التوافقية الذهبية: إجبار المشروع على استخدام إصدار ياندكس V6 المطابق لأكوادك الهجينة
      - name: Force Yandex SDK Version V6 Match
        run: |
          BUILD_GRADLE_PATH="app/build.gradle"
          if [ -f "$BUILD_GRADLE_PATH" ]; then
            sed -i "s/mobileads:8.1.0/mobileads:6.4.1/g" "$BUILD_GRADLE_PATH"
            sed -i "s/mobileads:7.2.0/mobileads:6.4.1/g" "$BUILD_GRADLE_PATH"
            sed -i "s/mobileads:5.10.0/mobileads:6.4.1/g" "$BUILD_GRADLE_PATH"
          fi

      # 6. إصلاح دالة الحجم برمجياً داخل BannerAdManager لتتوافق مع معايير V6 المستقرة
      - name: Fix Banner Size Code for V6
        run: |
          BANNER_PATH="app/src/main/java/com/chamapps/chamtube/BannerAdManager.java"
          if [ -f "$BANNER_PATH" ]; then
            sed -i 's/BannerAdSize.stickySize(this.activity, 320)/BannerAdSize.inlineSize(this.activity, 320)/g' "$BANNER_PATH"
            sed -i 's/BannerAdSize.stickySize(activity, 320)/BannerAdSize.inlineSize(activity, 320)/g' "$BANNER_PATH"
          fi

      # 7. حذف سطر AIDE تلقائياً برمجياً من الملف لمنع الخطأ الأصلي
      - name: Auto-Remove AIDE Code
        run: |
          FILE_PATH="app/src/main/java/com/chamapps/chamtube/MainActivity.java"
          if [ -f "$FILE_PATH" ]; then
            sed -i '/ADRTLogCatReader.onContext/d' "$FILE_PATH"
          fi

      # 8. بناء التطبيق مباشرة بأمر صامت لمنع أي توقف يدوية
      - name: Build Release APK
        run: |
          echo "org.gradle.jvmargs=-Xmx2048m" >> gradle.properties
          gradle :app:clean :app:assembleRelease --no-daemon --stacktrace --console=plain < /dev/null
        env:
          CI: true

      # 9. رفع وحفظ ملف الـ APK النهائي الجاهز للتحميل والتثبيت
      - name: Upload Build Artifact (APK)
        uses: actions/upload-artifact@v4
        with:
          name: ChamTube-Release-APK
          path: |
            app/build/outputs/apk/release/*.apk
            **/build/outputs/apk/release/*.apk
