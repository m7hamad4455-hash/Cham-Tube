name: Build and Sign Cham-Tube APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'zulu'
        cache: 'gradle'

    - name: Unzip Project Source
      run: |
        unzip -o app.zip -d extracted_project
        echo "Project unzipped successfully into extracted_project."
        # البحث عن المجلد الذي يحتوي على gradlew والتحرك إليه
        GRADLE_DIR=$(find . -name "gradlew" -exec dirname {} \; | head -n 1)
        echo "GRADLE_DIR=$GRADLE_DIR" >> $GITHUB_ENV

    - name: Patch ADRTLogCatReader and Banner Size
      run: |
        cd ${{ env.GRADLE_DIR }}
        # 1. إصلاح سطر ADRTLogCatReader المسبب للمشاكل
        find . -name "ADRTLogCatReader.java" -exec sed -i '/ADRTLogCatReader/d' {} +
        
        # 2. ضبط حجم البانر تلقائياً لملء الشاشة من العرض
        find . -name "*activity_main.xml" -o -name "*fragment_ad.xml" | xargs sed -i 's/wrap_content/match_parent/g' || true

    - name: Inject Banner ID and 30s Auto-Refresh Timer
      run: |
        cd ${{ env.GRADLE_DIR }}
        FILE_PATH=$(find . -name "BannerAdManager.java" | head -n 1)
        
        if [ -z "$FILE_PATH" ]; then
          echo "Error: BannerAdManager.java not found!"
          exit 1
        fi
        
        echo "Found BannerAdManager at: $FILE_PATH"
        
        # 1. حقن معرف الإعلان الرسمي الجديد الخاص بك تلقائياً
        sed -i 's/private static final String BANNER_AD_UNIT_ID = "[^"]*";/private static final String BANNER_AD_UNIT_ID = "RM-19531989-1";/g' "$FILE_PATH"
        sed -i 's/String adUnitId = "[^"]*";/String adUnitId = "RM-19531989-1";/g' "$FILE_PATH"
        
        # 2. حقن مكتبات المؤقت التكراري في قسم الـ imports
        sed -i '/package /a import android.os.Handler;\nimport android.os.Looper;' "$FILE_PATH"
        
        # 3. حقن متغيرات المؤقت داخل الكلاس
        sed -i '/public class BannerAdManager/a \    private Handler refreshHandler = new Handler(Looper.getMainLooper());\n    private Runnable refreshRunnable;' "$FILE_PATH"
        
        # 4. حقن منطق إعادة التحميل التلقائي كل 30 ثانية داخل ميثود تحميل الإعلان
        sed -i '/public void loadAd/a \        if (refreshRunnable == null) {\n            refreshRunnable = new Runnable() {\n                @Override\n                public void run() {\n                    loadAd();\n                }\n            };\n        }\n        refreshHandler.removeCallbacks(refreshRunnable);\n        refreshHandler.postDelayed(refreshRunnable, 30000);' "$FILE_PATH"
        
        echo "Banner ID and Auto-refresh successfully patched."

    - name: Grant Execute Permission to Gradle
      run: |
        cd ${{ env.GRADLE_DIR }}
        chmod +x gradlew

    - name: Build Release APK
      run: |
        cd ${{ env.GRADLE_DIR }}
        ./gradlew assembleRelease --no-daemon

    - name: Sign Release APK
      uses: r0adkll/sign-android-release@v1
      id: sign_app
      with:
        releaseDirectory: ${{ env.GRADLE_DIR }}/app/build/outputs/apk/release
        signingKeyBase64: ${{ secrets.SIGNING_KEY }}
        alias: ${{ secrets.ALIAS }}
        keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
        keyPassword: ${{ secrets.KEY_PASSWORD }}
      env:
        BUILD_TOOLS_VERSION: "34.0.0"

    - name: Upload Signed APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Cham-Tube-Signed-Release
        path: ${{ steps.sign_app.outputs.signedReleaseFile }}
