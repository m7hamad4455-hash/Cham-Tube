name: Build Cham-Tube APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Unzip Project Files First
      run: |
        rm -rf app
        if [ -f "app.zip" ]; then
          echo "Unzipping app.zip..."
          unzip -o app.zip
        else
          echo "Error: app.zip not found!"
          exit 1
        fi

    - name: Clean AIDE Local Tracking Codes
      run: |
        # حذف السطر الذي يسبب اعتراض السيرفر أونلاين تلقائياً قبل التجميع
        if [ -f "app/src/main/java/com/chamapps/chamtube/MainActivity.java" ]; then
          sed -i '/ADRTLogCatReader.onContext/d' app/src/main/java/com/chamapps/chamtube/MainActivity.java
          echo "تم تنظيف كود تعقب الـ AIDE بنجاح لتوافق السيرفر الأونلاين. ✅"
        fi

    - name: Install Gradle Wrapper Safely
      run: |
        gradle wrapper --gradle-version 8.7
        echo "تمت تهيئة ملف gradlew بنجاح. ✅"

    - name: Enable AndroidX Support
      run: |
        echo "android.useAndroidX=true" > gradle.properties
        echo "android.enableJetifier=true" >> gradle.properties
        if [ -d "app" ]; then
          echo "android.useAndroidX=true" > app/gradle.properties
          echo "android.enableJetifier=true" >> app/gradle.properties
        fi

    - name: Grant Execute Permission for Gradle
      run: |
        chmod +x gradlew
        if [ -f "app/gradlew" ]; then chmod +x app/gradlew; fi

    - name: Build with Gradle 8.7
      run: |
        ./gradlew clean assembleRelease --no-daemon

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ChamTube-Release-APK
        path: |
          **/build/outputs/apk/release/*.apk
          **/build/outputs/apk/debug/*.apk
